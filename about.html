<style>

:root{
--primary:#ff772b;
--light:#f9fafb;
--gray:#6b7280;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:var(--light);
color:#1a1a1a;
}

/* HEADER */

header{
background:white;
padding:15px 5%;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.logo{
display:flex;
align-items:center;
gap:12px;
flex-wrap:wrap;
}

.logo img{
height:50px;
max-width:100%;
}

.logo-text span{
font-size:24px;
font-weight:bold;
color:var(--primary);
}

.logo-text small{
font-size:13px;
color:var(--gray);
}

nav{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

nav a{
margin:8px 12px;
text-decoration:none;
color:#333;
font-weight:500;
}

nav a:hover{
color:var(--primary);
}

/* SECTION */

.section{
padding:60px 5%;
max-width:900px;
margin:auto;
width:100%;
}

.section h1{
color:var(--primary);
font-size:32px;
}

.section h2{
color:var(--primary);
margin-top:50px;
}

/* PROFILE CARD */

.profile{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
margin-top:30px;
text-align:center;
width:100%;
max-width:500px;
margin-left:auto;
margin-right:auto;
}

.profile img{
width:100%;
max-width:180px;
height:auto;
aspect-ratio:1/1;
object-fit:cover;
border-radius:50%;
margin-bottom:15px;
box-shadow:0 6px 18px rgba(0,0,0,0.15);
}

.profile-name{
font-size:24px;
font-weight:700;
}

.profile-title{
font-size:16px;
font-weight:700;
color:var(--primary);
margin-top:5px;
margin-bottom:12px;
}

.profile-desc{
font-size:15px;
color:#444;
line-height:1.6;
}

.profile-links{
margin-top:10px;
}

.profile-links a{
display:inline-block;
margin:6px 12px;
color:var(--primary);
font-weight:600;
text-decoration:none;
}

.profile-links a:hover{
text-decoration:underline;
}

/* FOOTER */

footer{
background:var(--primary);
color:white;
text-align:center;
padding:20px;
margin-top:60px;
font-size:14px;
}

/* RESPONSIVE BREAKPOINTS */

/* Tablet */
@media (max-width: 900px){

.section h1{
font-size:28px;
}

.profile-name{
font-size:22px;
}

}

/* Mobile */
@media (max-width: 600px){

header{
flex-direction:column;
text-align:center;
}

.logo{
justify-content:center;
}

nav{
margin-top:10px;
}

.section{
padding:40px 20px;
}

.section h1{
font-size:24px;
}

.profile{
padding:25px 15px;
}

.profile-name{
font-size:20px;
}

.profile-title{
font-size:15px;
}

.profile-desc{
font-size:14px;
}

.profile-links a{
display:block;
margin:6px 0;
}

}

</style>
